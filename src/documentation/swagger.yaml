      tags: [Certificados]
      summary: Registrar certificado
      description: |
        Registra un nuevo certificado para el usuario autenticado.
        Enviado como `multipart/form-data`.
        La imagen es validada por IA en dos pasos:
        1. Detección de contenido NSFW (HuggingFace).
        2. OCR + validación de que la imagen contiene texto característico de un certificado (OpenRouter).
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CertificateBody"
      responses:
