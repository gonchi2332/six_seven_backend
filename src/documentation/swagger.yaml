  # ─── REPORTS ──────────────────────────────────────────────────────────────────
  /api/v1/reports/user:
    get:
      tags: [Reportes]
      summary: Obtener reporte analítico del usuario autenticado
      description: |
        Devuelve datos analíticos de visitas a las secciones del portafolio del usuario autenticado.
        Agrupa las visitas según el período solicitado.

        **Interfaces disponibles:**
        | ID | Nombre |
        |----|--------|
        | 1  | Información Personal |
        | 2  | Habilidades Blandas |
        | 3  | Habilidades Técnicas |
        | 4  | Experiencia Laboral |
        | 5  | Educación |
        | 6  | Proyectos |
        | 7  | Certificados |
      security:
        - BearerAuth: []
      parameters:
        - name: period
          in: query
          required: false
          schema:
            type: string
            enum: [day, month, year]
          description: |
            Período de agrupación. Si no se envía, se devuelven todos los datos sin agrupar por tiempo.
            - `day`: agrupa por día de la semana (Lunes, Martes, ...)
            - `month`: agrupa por mes (Enero, Febrero, ...)
            - `year`: agrupa por año (2023, 2024, ...)
          example: month
      responses:
        "200":
          description: Reporte analítico obtenido correctamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  reports:
                    type: array
                    items:
                      $ref: "#/components/schemas/ReportRow"
        "400":
          description: Período inválido.
        "401":
          description: Token no proporcionado o expirado.
        "500":
          description: Error interno del servidor.

tags:
  - name: Sistema
    description: Endpoints de infraestructura y salud del servidor.
  - name: Autenticación
    description: Registro, login, recuperación de contraseña, sesión y tokens JWT.
  - name: Información Personal
    description: Gestión de la información personal del portafolio (nombre, foto, contacto, residencia, visibilidad).
  - name: Verificación de Email
    description: Flujo de verificación del correo electrónico del usuario para activar la cuenta.
  - name: Perfil
    description: Enlace público del perfil y listado general de usuarios verificados.
  - name: Habilidades del Sistema
    description: Catálogo de hard skills y soft skills disponibles en la plataforma.
  - name: Habilidades del Usuario
    description: Gestión de las habilidades técnicas y blandas del portafolio de cada usuario.
  - name: Plataformas Externas
    description: Integración con LinkedIn y GitHub.
  - name: Experiencia Laboral
    description: CRUD de experiencia laboral con validación de cargo por IA.
  - name: Proyectos
    description: CRUD de proyectos personales con validación de imagen por IA.
  - name: Educación
    description: CRUD de formación académica con validación de título por IA.
  - name: Certificados
    description: CRUD de certificados con validación de imagen (NSFW + OCR) por IA.
  - name: Reportes
    description: Analítica de visitas al portafolio agrupadas por período.
