  # ─── EXPERIENCIA LABORAL ──────────────────────────────────────────────────────
  /api/v1/portfolio/users/laboral-experience:
    post:
      tags: [Experiencia Laboral]
      summary: Registrar experiencia laboral
      description: |
        Registra una nueva experiencia laboral para el usuario autenticado.
        El campo `position` es validado por IA (Groq) para verificar que sea un cargo
        relacionado con el ámbito de TI/Software.
        Si `endDate` no se envía, se asume que el trabajo es actual.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LaboralExperienceBody"
      responses:
        "200":
