              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Datos inválidos, imagen rechazada por IA, o certificado ya existente.
        "401":
          description: Token no proporcionado o expirado.
        "500":
          description: Error interno del servidor.

    patch:
      tags: [Certificados]
      summary: Modificar certificado
      description: |
        Modifica un certificado existente del usuario autenticado identificado por `id` en query params.
        El campo `title` no se puede modificar.
        Enviado como `multipart/form-data`.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: integer
          example: 2
      requestBody:
        required: false
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/ModifyCertificateBody"
      responses:
